name: CI with Debug

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  debug-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pytest
        run: pip install pytest

      - name: Run Python script with debugger
        run: |
          python -m pdb calculator.py
