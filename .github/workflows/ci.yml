name: Full CI Pipeline Demo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  setup:
    name: Setup Job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo files
        run: ls -la

  test:
    name: Test Job
    runs-on: ubuntu-latest
    needs: setup   # dependency (runs after setup job)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements file found"

      - name: Run tests (or script)
        run: |
          echo "Running Python file..."
          python app.py || echo "No app.py found"

  deploy:
    name: Deploy Job
    runs-on: ubuntu-latest
    needs: test   # runs only if test succeeds

    steps:
      - name: Deployment simulation
        run: echo "Deploying application..."
